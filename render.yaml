services:
  - type: web
    name: wildguard-live
    env: node
    plan: starter
    autoDeploy: true
    buildCommand: npm install --no-audit --no-fund
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: RATE_LIMIT_MAX
        value: "180"
