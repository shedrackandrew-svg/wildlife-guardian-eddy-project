name: Deploy Backend to Render

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  trigger-render-deploy:
    if: ${{ secrets.RENDER_API_KEY != '' && secrets.RENDER_SERVICE_ID != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger Render deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          echo "Triggering Render deploy for service srv-$RENDER_SERVICE_ID"
          STATUS_CODE=$(curl -sS -o /tmp/render_deploy_response.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Accept: application/json" \
            "https://api.render.com/deploy/srv-$RENDER_SERVICE_ID")
          echo "Render API status: $STATUS_CODE"
          cat /tmp/render_deploy_response.json
          if [ "$STATUS_CODE" -lt 200 ] || [ "$STATUS_CODE" -ge 300 ]; then
            echo "Render deploy trigger failed"
            exit 1
          fi
