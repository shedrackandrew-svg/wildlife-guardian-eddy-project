<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WildGuard Global Species Inventory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Manrope:wght@400;500;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="slideshow-bg" aria-hidden="true"></div>
    <div class="overlay-mask" aria-hidden="true"></div>
    <header class="site-nav">
      <div class="nav-inner">
        <a class="nav-brand" href="/">
          <img src="https://images.unsplash.com/photo-1546182990-dffeafbe841d?auto=format&fit=crop&w=256&q=80" alt="WildGuard" onerror="this.onerror=null;this.src='/static/tiger-logo.svg';" />
          <span>WildGuard</span>
        </a>
        <nav class="nav-links">
          <a href="/">Home</a>
          <a href="/dashboard">Dashboard</a>
          <a href="/library">Library</a>
          <a href="/inventory">Inventory</a>
          <a href="/history">History</a>
          <a href="/map">Map</a>
          <a href="/live">Live</a>
        </nav>
      </div>
    </header>

    <main class="layout single">
      <section class="panel telemetry">
        <div class="panel-head">
          <h1>Global Species Inventory</h1>
          <p>Database-backed species registry for all animal classes with individual details and photos.</p>
        </div>

        <div class="stack">
          <div class="lookup-row">
            <input id="inventorySearch" type="text" placeholder="Search species, scientific name, family" />
            <input id="inventoryClass" type="text" placeholder="Class filter (e.g. Mammalia, Insecta)" />
            <button id="inventorySearchBtn" type="button">Search</button>
          </div>
          <div class="lookup-row">
            <input id="syncClassName" type="text" value="Mammalia" placeholder="Class to sync (Mammalia, Aves, Insecta...)" />
            <input id="syncLimit" type="number" value="300" min="1" max="1200" step="50" />
            <input id="syncOffset" type="number" value="0" min="0" step="300" />
            <button id="syncSpeciesBtn" type="button">Sync Class To DB</button>
          </div>
          <div id="inventoryMeta" class="profile-box">Loading global species inventory...</div>
        </div>

        <div id="inventoryGrid" class="gallery-grid large-grid"></div>
      </section>
    </main>

    <script src="/static/site.js" type="module"></script>
    <script src="/static/inventory.js" type="module"></script>
  </body>
</html>
