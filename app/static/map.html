<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WildGuard Habitat Map</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Manrope:wght@400;500;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="slideshow-bg" aria-hidden="true"></div>
    <div class="overlay-mask" aria-hidden="true"></div>
    <header class="site-nav">
      <div class="nav-inner">
        <a class="nav-brand" href="/">
          <img src="https://images.unsplash.com/photo-1546182990-dffeafbe841d?auto=format&fit=crop&w=256&q=80" alt="WildGuard" onerror="this.onerror=null;this.src='/static/tiger-logo.svg';" />
          <span>WildGuard</span>
        </a>
        <nav class="nav-links">
          <a href="/">Home</a>
          <a href="/dashboard">Dashboard</a>
          <a href="/library">Library</a>
          <a href="/history">History</a>
          <a href="/map">Map</a>
          <a href="/live">Live</a>
        </nav>
      </div>
    </header>
    <main class="layout single">
      <section class="panel telemetry">
        <div class="panel-head">
          <h1>Wildlife Globe Habitat Map</h1>
          <p>Click a species from inventory to jump here and view real-world habitat radar hotspots.</p>
        </div>
        <div class="stack">
          <div id="mapLegend" class="profile-box">Loading map...</div>
          <div class="map-layout">
            <div id="worldMap" class="world-map"></div>
            <aside class="map-side-panel">
              <div id="selectedSpecies" class="profile-box">No species selected yet.</div>
              <div id="zoneGrid" class="gallery-grid large-grid"></div>
            </aside>
          </div>
        </div>
      </section>
    </main>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="/static/site.js" type="module"></script>
    <script src="/static/map.js" type="module"></script>
  </body>
</html>
