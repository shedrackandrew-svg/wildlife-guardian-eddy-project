<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WildGuard Remote Camera</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Manrope:wght@400;500;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="slideshow-bg" aria-hidden="true"></div>
    <div class="overlay-mask" aria-hidden="true"></div>
    <div class="project-signature">PROJECT BY WILDGUARD</div>

    <main class="layout single">
      <section class="panel telemetry">
        <div class="panel-head">
          <h1>Remote Phone Camera</h1>
          <p>This page sends phone camera frames to WildGuard AI.</p>
          <div class="quick-links">
            <a href="/">Dashboard</a>
            <a href="/onboarding">Back to Onboarding</a>
          </div>
        </div>

        <div class="video-wrap">
          <video id="phoneVideo" autoplay playsinline muted></video>
        </div>

        <div class="actions">
          <button id="startStream">Start Stream</button>
          <button id="stopStream">Stop Stream</button>
        </div>

        <div class="lookup-row">
          <label for="streamInterval">Upload interval (ms)</label>
          <input id="streamInterval" type="number" value="1300" min="700" max="4000" step="100" />
        </div>
        <div class="lookup-row">
          <label for="streamQuality">Image quality (0.4 - 1.0)</label>
          <input id="streamQuality" type="number" value="0.82" min="0.4" max="1" step="0.01" />
        </div>

        <div id="phoneStatus" class="profile-box">Waiting to start.</div>
      </section>
    </main>

    <script src="/static/remote_camera.js" type="module"></script>
  </body>
</html>
